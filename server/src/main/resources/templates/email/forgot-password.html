<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: helvetica, 'helvetica neue', arial, verdana, sans-serif;
      font-size: 16px;
      color: #131313;
      background-color: #DDDDDD;
      padding: 30px 16px;
    }

    .wrapper {
      max-width: 600px;
      margin: 0 auto;
    }

    .card {
      background-color: #FFFFFF;
      border-radius: 20px;
      overflow: hidden;
    }

    .card-header {
      background-color: #009FA0;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo {
      height: 60px;
      width: auto;
    }

    .illustration {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 40px 48px;
    }

    h1 {
      font-size: 22px;
      color: #0000CC;
      margin-bottom: 16px;
      word-break: break-word;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 24px;
      word-break: break-word;
    }

    .btn {
      display: inline-block;
      background-color: #009FA0;
      color: #FFFFFF;
      text-decoration: none;
      border-radius: 10px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 24px;
    }

    .footer {
      text-align: center;
      font-size: 13px;
      color: #666666;
      margin-top: 20px;
    }

    @media screen and (max-width: 480px) {
      body {
        padding: 16px 8px;
      }

      .illustration {
        max-height: 200px;
      }

      .card-body {
        padding: 28px 20px;
      }

      h1 {
        font-size: 18px;
      }

      p {
        font-size: 14px;
      }

      .btn {
        display: block;
        width: 100%;
        text-align: center;
        padding: 14px 16px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="card-header">
        <!-- USE THIS IN DEVELOPMENT -->
        <img class="logo" src="cid:umpsaLogo" alt="UMPSA Logo">
        <!-- USE THIS IN PRODUCTION. UNCOMMENT THIS IF IN PRODUCTION -->
        <!-- <img class="logo" src="https://127.0.0.1/images/logo-umpsa.png" alt="UMPSA Logo"> -->
      </div>

      <div>
        <!-- USE THIS IN DEVELOPMENT -->
        <img class="illustration" src="cid:illustration" alt="Image Illustration">
        <!-- USE THIS IN PRODUCTION. UNCOMMENT THIS IF IN PRODUCTION -->
        <!-- <img class="illustration" src="https://127.0.0.1/images/e-hailing-illustration.png" alt="Image Illustration"> -->
      </div>

      <div class="card-body">
        <h1>Forgot your password? it happens to the best of us.</h1>
        <p>To reset your password, click the button below. The link will expire in 15 minutes.</p>
        <a class="btn" th:href="@{'http://127.0.0.1/reset-password?token=' + ${token}}" target="_blank">
          Reset your password
        </a>
        <p>If you do not know why you received this email, you can just ignore it.</p>
      </div>
    </div>

    <p class="footer">©2025 Hazmi Hazim. All rights reserved.</p>
  </div>
</body>
</html>
