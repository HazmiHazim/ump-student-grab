name: ump_student_grab_mobile
description: "Mobile app for ump student grab"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP client
  dio: ^5.7.0

  # Routing
  go_router: ^14.6.2

  # Functional error handling
  fpdart: ^1.1.0

  # UI / UX
  lottie: ^3.1.3
  fluttertoast: ^8.2.8
  smooth_page_indicator: ^1.2.0+3

  # Environment & config
  flutter_dotenv: ^5.2.1

  # WebSocket (STOMP)
  stomp_dart_client: ^2.1.0

  # Local storage
  shared_preferences: ^2.3.3

  # Maps & location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  flutter_polyline_points: ^2.1.0

  # Broadcast (location updates)
  fbroadcast: ^2.0.0

  # Utilities
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - .env
